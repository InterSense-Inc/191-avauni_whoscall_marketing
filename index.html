<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+HK:wght@100..900&family=Comfortaa:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header id="header">
      <div class="header-content">
        <div class="logo">
          <img src="images/logo.png" alt="logo" />
        </div>
        <nav>
          <ul class="nav-list">
            <li><a href="#prizes">獎品詳情</a></li>
            <li><a href="#steps">抽獎步驟</a></li>
            <li><a href="#raffle-link">抽獎連結</a></li>
            <li><a href="#">下載 Whoscall</a></li>
          </ul>
        </nav>
      </div>
    </header>
    <main>
      <section id="hero">
        <div class="hero-container">
          <div class="hero-content">
            <div class="hero-content-text">
              <h1>全港商鋪推廣計畫</h1>
              <h2>Whoscall 進階版</h2>
            </div>
            <div class="qr-code-area">
              <span>一掃即抽</span>
              <div class="qr-code-wrapper">
                <img src="images/qr-code.png" alt="qr-code" />
              </div>
              <ul>
                <li>
                  <img
                    src="images/icon-1.png"
                    alt="短訊網址連結掃描icon"
                  />短訊網址連結掃描
                </li>
                <li>
                  <img src="images/icon-2.png" alt="移除廣告icon" />移除廣告
                </li>
                <li>
                  <img
                    src="images/icon-3.png"
                    alt="自動更新號碼資料庫icon"
                  />自動更新號碼資料庫
                </li>
              </ul>
            </div>
            <div class="download-button-group">
              <a href="#" class="download-link">
                <span class="link-icon">
                  <i class="fa-brands fa-google-play"></i>
                </span>
                <span class="link-text-group">
                  <span class="link-text link-text-top">Get it on</span>
                  <span class="link-text link-text-bottom">Google Play</span>
                </span>
              </a>
            </div>
          </div>
        </div>
      </section>
      <section id="prizes">
        <div class="prizes-content">
          <div class="prizes-item">
            <div class="image-wrapper">
              <img src="images/prize-1.png" alt="prize-1" />
            </div>
            <div class="prizes-item-content">
              <h3>進階版一個月</h3>
              <p>價值<span>xxx</span>元</p>
            </div>
          </div>
        </div>
      </section>
      <section id="about"></section>
      <section id="raffle-link"></section>
    </main>
  </body>
</html>
